function myround(value, precision) {
    var multiplier = Math.pow(10, precision || 0);
    return Math.round(value * multiplier) / multiplier;
}

// these hold the date range of the currently loaded data
let startdate = luxon.DateTime.now().startOf('day').toJSDate();
let enddate = luxon.DateTime.now().endOf('day').toJSDate();

// push end date to end of day
function dayEnd(pick){
    var dayend = luxon.DateTime.fromJSDate(pick).endOf('day').toJSDate()
    return dayend
}
let picker1, picker2;
function initRangeButtons() {
    document.querySelectorAll('#btw .btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#btw .btn')
                .forEach(b => b.classList.remove('active'));

            btn.classList.add('active');

            let start = new Date();
            let now = new Date();
            now.setDate(now.getUTCDate());

            switch (btn.dataset.range) {
                case 'week':  start.setDate(now.getUTCDate() - 7); break;
                case 'month': start.setDate(now.getUTCDate() - 31); break;
                case 'year':  start.setDate(now.getUTCDate() - 365); break;
                default:      start.setDate(now.getUTCDate()); break;
            }

            let newstart = luxon.DateTime.fromJSDate(start).startOf('day').toJSDate();
            let newend = luxon.DateTime.now().endOf('day').toJSDate();

            picker1.setMax(newend);
            picker2.setMax(newend);
            picker1.setDate(newstart);
            picker2.setDate(newend);
            updateCharts(newstart, newend, chart1params, chart2params);
        });
    });
    picker1 = datepicker( "#dpk1" , {
        id: 1,
        dateSelected: startdate,
        maxDate: enddate,
        formatter: (input, date, instance) => {
            input.value = luxon.DateTime.fromJSDate(date).toFormat('yyyy-LL-dd');
        },
        onSelect: instance => {
            if (picker1.dateSelected > picker2.dateSelected) {
                picker2.setDate(picker1.dateSelected);
            }
            document.querySelectorAll('#btw .btn')
                .forEach(b => b.classList.remove('active'));
            updateCharts(picker1.dateSelected, dayEnd(picker2.dateSelected),
                chart1params, chart2params);
        }
    });
    picker2 = datepicker( "#dpk2" , {
        id: 2,
        dateSelected: enddate,
        maxDate: enddate,
        formatter: (input, date, instance) => {
            input.value = luxon.DateTime.fromJSDate(date).toFormat('yyyy-LL-dd');
        },
        onSelect: instance => {
            if (picker1.dateSelected > picker2.dateSelected) {
                picker1.setDate(picker2.dateSelected);
                picker1.setMax(picker2.dateSelected);
            } else {
                picker1.setMax(picker2.dateSelected);
            }
            document.querySelectorAll('#btw .btn')
                .forEach(b => b.classList.remove('active'));
            updateCharts(picker1.dateSelected, dayEnd(picker2.dateSelected),
                chart1params, chart2params);
        }
    });
}
//select timescale using parameters from buttons or datepicker
function needsReload(mystart, myend) {

    //if reload is set we need to fetch more data
    var reload = false;

    if (mystart < startdate) {
        reload = true;
        };
    if (myend > enddate) {
        reload = true;
        };
    if (myend > new Date()) {
        const latest = Date.parse(global_data[0].received_at);
        if ((Date.now() - latest) > 600_000) {
            reload = true;
        }
    }
    // If the period is going from more that 336 hours to less then we have 
    // hourly data and need to reload to get 10 minute interval data.
    // simularly if we are going from more than 2232 hours to less, we 
    // are going from daily to hourly data and need to reload.
    var oldlength = enddate - startdate
    var newlength = myend - mystart
    if ( (oldlength > 336*3600000) && (newlength < 336*3600000) ) {
        reload = true
    }
    if ( (oldlength > 2232*3600000) && (newlength < 2232*3600000) ) {
        reload = true
    }
    return reload 
}

let HOL = null;
async function loadCurrentConditions() {
    try {
        const setlevel = await getSetlevel();
        HOL = setlevel.level;
        anno_HOL.value = HOL;
        const plc = await getPLCDataCurrent();
        setText("ts1", luxon.DateTime.fromISO(plc.received_at).toFormat('yyyy-LL-dd T') + ' UTC');

        setText("upstream", plc.upstream.toFixed(2));
        setText("downstream", plc.downstream.toFixed(2));
        setText("headvalue", (plc.upstream - plc.downstream).toFixed(2));
        setText("forbay1", plc.forebay_1.toFixed(2));
        setText("power_g1", plc.gen1_power_kw.toFixed(1));
        setText("screw1-rpm", plc.gen1_screw_rpm.toFixed(0));
        setText("drive1-rpm", plc.gen1_drive_rpm.toFixed(0));
        setText("torque1", (plc.gen1_torque * 1.932).toFixed(0));
        setText("inverter1", plc.gen1_inverter_amp.toFixed(1));
        setText("gearbox1", plc.gen1_gearbox_temp.toFixed(1));
        setText("flow1value", (plc.gen1_flow_ls/1000).toFixed(2));
        setText("operating1", plc.gen1_operating_hours.toFixed(0));
        setText("energy1", plc.gen1_energy_mwh.toFixed(1));

        setText("ts2", luxon.DateTime.fromISO(plc.received_at).toFormat('yyyy-LL-dd T') + ' UTC');
        setText("forbay2", plc.forebay_2.toFixed(2));
        setText("power_g2", plc.gen2_power_kw.toFixed(1));
        setText("screw2-rpm", plc.gen2_screw_rpm.toFixed(0));
        setText("drive2-rpm", plc.gen2_drive_rpm.toFixed(0));
        setText("torque2", (plc.gen2_torque * 1.932).toFixed(0));
        setText("inverter2", plc.gen2_inverter_amp.toFixed(1));
        setText("gearbox2", plc.gen2_gearbox_temp.toFixed(1));
        setText("flow2value", (plc.gen2_flow_ls/1000).toFixed(2));
        setText("operating2", plc.gen2_operating_hours.toFixed(0));
        setText("energy2", plc.gen2_energy_mwh.toFixed(1));
    } catch (e) {
        console.warn("Current conditions update failed", e);
    }
    const meter = await getMeterData();
    setText("now_total", (meter[0].export/1000).toFixed(3));
}

function updateCharts(start, end, chart1params, chart2params) {
    if (needsReload(start, end)) {
        getPLCData(start, end).then(() => {
            if (chart1params) {
                renderChart1(start, end, chart1params);
            };
            if (chart2params) {
                renderChart2(start, end, chart2params);
            };
        });
    } else {
        renderChart1(start, end, chart1params);
        renderChart2(start, end, chart2params);
    }
};

        id: 'line1',
        mode: 'horizontal',

            yAdjust: 10,
            enabled: true,
        }
    }; 
function myMinValue(arr) {
    return Math.floor(Math.min(...arr) * 9.98)/10;
}
function renderChart1(start, end, params) {

    const xs = [];
    const ys1 = [];

    var selection = global_data.filter(function(item){
        return new Date(item.received_at) >= start &&
            new Date(item.received_at) <= end
    })
    var length = end - start
    var unit = 'hour'
    if (length >= 172800000){
        unit = 'day'
        }
    switch (params.y1element) {
        case "upstream":
            for(item of selection) {                
                xs.push(new Date(item.received_at).getTime());
                ys1.push(item[params.y1element]);
            };
            params.minvalue = myMinValue(ys1.concat(HOL));
            break;
        case "downstream":
            for(item of selection) {                
                xs.push(new Date(item.received_at).getTime());
                ys1.push(item[params.y1element]);
            }
            params.minvalue = myMinValue(ys1);
            break;
        case "headvalue":
            for(item of selection) {                
                xs.push(new Date(item.received_at).getTime());
                ys1.push(item.upstream - item.downstream);
            }
            break;
    }

    const ctx = document.getElementById('ca_one').getContext('2d');
    if (typeof myChart_one !== 'undefined' && myChart_one) {
        myChart_one.destroy();
    }
    myChart_one = new Chart(ctx, {
        type: 'line',
        data: {
            labels: xs,
            datasets: [
                {
                    label: params.title,
                    data: ys1,
                    fill: true,
                    backgroundColor: params.bgcolor,
                    borderColor: params.bocolor,
                    borderWidth: 1,
                    radius: 0,
                }
            ]
        },
        options: {
            annotation: {
                drawTime: 'afterDraw',
                annotations: [anno_HOL],
            },
            scales: {
                xAxes: [{
                    type: 'time', 
                    time: {minUnit: unit,},
                    distribution: 'linear',
                    ticks: {
                        fontStyle: "bold",
                        min: start.getTime(),
                        max: end.getTime(),
                    },
                    scaleLabel: {
                        display:false,
                    }
                }],
                yAxes: [{
                    ticks: {
                        fontSize: 15,
                        fontStyle: "bold",
                        min: params.minvalue,
                    },
                    scaleLabel: {
                        display:false,
                    }
                }]
            },
            title: {
                text: params.title,
                display:true,
            },
        }
    });
    if (params.y1element == "upstream") {
        myChart_one.config.options.annotation.annotations[0] = anno_HOL;
        }
    else {
        myChart_one.config.options.annotation.annotations[0] = "";
        };
    myChart_one.update();
}
function renderChart2(start, end, params) {

    const xs = [];
    const ys1 = [];
    const ys2 = [];

        var selection = global_data.filter(function(item){
        return new Date(item.received_at) >= start &&
            new Date(item.received_at) <= end
    })
    var length = end - start
    var unit = 'hour'
    if (length >= 172800000){
        unit = 'day'
        }

    for(item of selection) {                
        //convert the timestamp to milliseconds (faster)                
        xs.push(new Date(item.received_at).getTime());
        ys1.push(Math.max(0, item[params.y1element] * params.unitfactor));
        ys2.push(Math.max(0, item[params.y2element] * params.unitfactor));
    }
    if (params.minvalue == null) {
        params.minvalue = myMinValue(ys1.concat(ys2));
    }
    const ctx = document.getElementById('ca_two').getContext('2d');
    if (typeof myChart_two !== 'undefined' && myChart_two) {
        myChart_two.destroy();
    }
    myChart_two = new Chart(ctx, {
        type: 'line',
        data: {
            labels: xs,
            datasets: [
                {
                    label: 'Tony (Turbine 1)',
                    data: ys1,
                    fill: true,
                    backgroundColor: 'rgba(143, 118, 242, 0.70)',
                    borderColor: 'rgba(143, 118, 242, 1)',
                    borderWidth: 1,
                    radius: 0,
                },
                {
                    label: 'Sophie (Turbine 2)',
                    data: ys2,
                    fill: true,
                    backgroundColor: 'rgba(230, 48, 86, 0.70)',
                    borderColor: 'rgba(230, 48, 86, 1)',
                    borderWidth: 1,
                    radius: 0,
                }
            ]
        },
        options: {
            scales: {
                xAxes: [{
                    type: 'time', 
                    time: {minUnit: unit,},

    if (interval < 600_000 && plcCache) {
        return plcCache;
    }
    plcCache = await fetch('/api/plc/current')
        .then(res => res.json());
    plcTime = Date.parse(plcCache.received_at);
    return plcCache;
}

async function getMeterData(){
    if (globalMeterData) {
        return globalMeterData;
    }
    const response = await fetch('/api/meter/current');

        throw new Error('HTTP error! status: ${response.status}');
    }
    meterCache = await response.json();

    return globalMeterData;
}
